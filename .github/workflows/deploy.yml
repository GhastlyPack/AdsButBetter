name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/adsbutbetter
            git pull origin main
            npm ci
            npx tsc
            cp src/db/schema.sql dist/db/schema.sql
            cd dashboard
            npm ci
            npm run build
            cd ..
            rm -f adsbutbetter.db
            npm prune --omit=dev
            sudo systemctl restart adsbutbetter
